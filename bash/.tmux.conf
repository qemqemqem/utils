# Mouse support
set -g mouse on

# Change prefix from C-b to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Navigate panes with Alt+arrows (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Quick reload of config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Terminal and color settings
set -g default-terminal "screen-256color"

# Status bar settings
set -g status-interval 5
set -g status-style bg='#f5f5f5',fg='#333333'
set -g status-left '#[bg=#e0e0e0]#[fg=#333333] #{?client_prefix,🔥,🐦} #[bg=#d0d0d0]#[fg=#333333] tmux:#S [pane #P] '
set -g status-left-length 100
set -g status-right '#[fg=#333333,bg=#e0e0e0] %H:%M %d-%b-%y '

# Window status - light theme
setw -g window-status-current-format '#[fg=#ffffff,bg=#007acc]#[fg=#ffffff,bg=#007acc] #I #W #[fg=#007acc,bg=#f5f5f5]'
setw -g window-status-format '#[fg=#333333,bg=#e8e8e8] #I #W #F '

# Pane borders - BRIGHT BLUE for active pane
set -g pane-border-style fg='#d0d0d0'
set -g pane-active-border-style fg='#0080ff'

# Active pane gets subtle blue-green tint, inactive panes get light gray
setw -g window-style fg='#333333',bg='#f8f8f8'        # Dark text, light gray bg for inactive
setw -g window-active-style fg='#000000',bg='#f7ffff' # Black text, subtle pink tint for active

# History and activity
set -g history-limit 50000
setw -g monitor-activity on
set -g visual-activity on

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Pane management
bind-key S command-prompt -p "Swap pane with:" "swap-pane -t '%%'"
bind Space next-layout

# Prevent accidental suspending
unbind ^Z
unbind C-z
unbind-key -T prefix C-z

# Zoom pane bindings
bind-key -n C-z resize-pane -Z
bind-key -n M-z resize-pane -Z

# Nested session support
unbind b
bind-key b send-keys C-b
bind-key -n C-b send-keys C-b

# Zsh
set-option -g default-shell /bin/zsh
